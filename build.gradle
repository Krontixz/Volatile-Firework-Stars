plugins {
	id 'fabric-loom' version '1.17'
	id 'maven-publish'
}

version = "1.0.0"
group = "net.krontixz"

base {
	archivesName = "volatile-firework-stars"
}

repositories {
	mavenCentral()
}

dependencies {
	minecraft "com.mojang:minecraft:26.2"
	mappings "net.fabricmc:yarn:26.2+build.1:v2"
	modImplementation "net.fabricmc:fabric-loader:0.19.0"
	modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.26.2"
}

processResources {
	inputs.property "version", project.version
	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_21
	targetCompatibility = JavaVersion.VERSION_21
}
